<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@latest/ol.css">
    <script src="https://cdn.jsdelivr.net/npm/ol@latest/dist/ol.js"></script>
    <style>
        html,
        body,
        #map {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #cfe4f2;
            font-family: Arial, sans-serif;
        }

        .ol-control button {
            background-color: #102a43;
        }

        .ol-control button:hover,
        .ol-control button:focus {
            background-color: #243b53;
        }

        .map-label {
            position: absolute;
            z-index: 1;
            left: 12px;
            bottom: 12px;
            padding: 8px 10px;
            border: 1px solid rgba(16, 42, 67, 0.16);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.9);
            color: #102a43;
            font-size: 12px;
            line-height: 1.3;
            box-shadow: 0 8px 22px rgba(16, 42, 67, 0.12);
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="map-label">OpenLayers domain map</div>
    <script>
        const boundarySource = new ol.source.Vector({
            url: new URL("../../data/world.geojson", window.location.href).href,
            format: new ol.format.GeoJSON()
        });

        const boundaryLayer = new ol.layer.Vector({
            source: boundarySource,
            style: new ol.style.Style({
                stroke: new ol.style.Stroke({
                    color: "rgba(16, 42, 67, 0.62)",
                    width: 1
                }),
                fill: new ol.style.Fill({
                    color: "rgba(255, 255, 255, 0.12)"
                })
            })
        });

        const map = new ol.Map({
            target: "map",
            layers: [
                new ol.layer.Tile({
                    source: new ol.source.OSM()
                }),
                boundaryLayer
            ],
            view: new ol.View({
                center: ol.proj.fromLonLat([121.0, 13.0]),
                zoom: 5
            })
        });

        boundarySource.once("change", () => {
            if (boundarySource.getState() !== "ready") {
                return;
            }

            const extent = boundarySource.getExtent();
            if (!ol.extent.isEmpty(extent)) {
                map.getView().fit(extent, {
                    padding: [28, 28, 28, 28],
                    duration: 350,
                    maxZoom: 5
                });
            }
        });
    </script>
</body>
</html>
